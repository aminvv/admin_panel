<div class="auth-page">
  <div class="auth-page__content-block">
    <div class="auth-page__content-wrapper">
<mat-tab-group class="auth-page__group" mat-stretch-tabs [(selectedIndex)]="selectedTabIndex">
        <mat-tab label="ورود">
          <div class="auth-page__border-wrapper">
            <div class="auth-page__border-line"></div>
          </div>
          <app-login-form
            (sendLoginForm)="sendLoginForm($event)"
            (forgotPasswordClick)="goToForgotPasswordTab()"
          ></app-login-form>
        </mat-tab>

        <mat-tab label="فراموشی رمز">
          <div class="auth-page__border-wrapper">
            <div class="auth-page__border-line"></div>
          </div>

          <app-forgot-password-form
            *ngIf="forgotPasswordStep === 'request'"
            (codeSent)="onCodeSent($event)"
          ></app-forgot-password-form>

          <app-reset-password-form
            *ngIf="forgotPasswordStep === 'reset'"
            [email]="forgotPasswordEmail"
            (success)="onResetSuccess()"
          ></app-reset-password-form>
        </mat-tab>

      </mat-tab-group>
    </div>
  </div>

  <div class="auth-page__logo">
    <div class="auth-page__logo-wrapper">
      <!-- <img class="auth-page__logo-img" src="./assets/auth/logo.svg" alt="logo" /> -->
      <h6 class="auth-page__logo-title">ISOGUM </h6>
    </div>
  </div>
</div>
