<form class="form" [formGroup]="form" (ngSubmit)="login()">
  <mat-form-field class="form__input">
    <input matInput placeholder="ایمیل" type="email" formControlName="email" />
  </mat-form-field>

  <mat-form-field class="form__input">
    <input matInput placeholder="رمز" type="password" formControlName="password" />
  </mat-form-field>

  <div class="form-actions">
    <button class="form-actions__login" mat-raised-button color="primary" type="submit">
      ورود
    </button>
    <button class="form-actions__forget" mat-button type="button" (click)="onForgotPasswordClick()">
      فراموشی رمز 
    </button>
  </div>
</form>
