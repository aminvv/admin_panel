<form [formGroup]="form" (ngSubmit)="onSubmit()" class="forgot-password-form">
  <h4 class="forgot-password-form__title">فراموشی رمز عبور</h4>
  <p class="forgot-password-form__desc">ایمیل خود را وارد کنید تا کد بازیابی برایتان ارسال شود.</p>

  <mat-form-field appearance="outline" class="forgot-password-form__field">
    <mat-label>ایمیل</mat-label>
    <input matInput formControlName="email" type="email" placeholder="example@gmail.com" />
    <mat-error *ngIf="form.get('email')?.hasError('required')">ایمیل الزامی است</mat-error>
    <mat-error *ngIf="form.get('email')?.hasError('email')">فرمت ایمیل نادرست است</mat-error>
  </mat-form-field>

  <div class="forgot-password-form__message forgot-password-form__message--error" *ngIf="errorMessage">
    {{ errorMessage }}
  </div>
  <div class="forgot-password-form__message forgot-password-form__message--success" *ngIf="successMessage">
    {{ successMessage }}
  </div>

  <button
    mat-raised-button
    color="primary"
    type="submit"
    class="forgot-password-form__submit"
    [disabled]="loading"
  >
    {{ loading ? 'در حال ارسال...' : 'ارسال کد' }}
  </button>
</form>
