<form [formGroup]="form" (ngSubmit)="onSubmit()" class="reset-password-form">
  <h4 class="reset-password-form__title">تعیین رمز عبور جدید</h4>
  <p class="reset-password-form__desc">کد ارسال‌شده به {{ email }} و رمز جدید را وارد کنید.</p>

  <mat-form-field appearance="outline" class="reset-password-form__field">
    <mat-label>کد بازیابی</mat-label>
    <input matInput formControlName="code" type="text" />
    <mat-error *ngIf="form.get('code')?.hasError('required')">کد الزامی است</mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline" class="reset-password-form__field">
    <mat-label>رمز عبور جدید</mat-label>
    <input matInput formControlName="newPassword" type="password" />
    <mat-error *ngIf="form.get('newPassword')?.hasError('required')">رمز عبور الزامی است</mat-error>
    <mat-error *ngIf="form.get('newPassword')?.hasError('minlength')">حداقل ۶ کاراکتر</mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline" class="reset-password-form__field">
    <mat-label>تکرار رمز عبور</mat-label>
    <input matInput formControlName="confirmPassword" type="password" />
    <mat-error *ngIf="form.get('confirmPassword')?.hasError('required')">تکرار رمز الزامی است</mat-error>
  </mat-form-field>

  <div class="reset-password-form__message reset-password-form__message--error" *ngIf="errorMessage">
    {{ errorMessage }}
  </div>
  <div class="reset-password-form__message reset-password-form__message--success" *ngIf="successMessage">
    {{ successMessage }}
  </div>

  <button
    mat-raised-button
    color="primary"
    type="submit"
    class="reset-password-form__submit"
    [disabled]="loading"
  >
    {{ loading ? 'در حال ثبت...' : 'ثبت رمز جدید' }}
  </button>
</form>
